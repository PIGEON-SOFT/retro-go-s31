name: ci

on: 
  workflow_dispatch:      # Start a workflow
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Repository checks
      run: |
        test -f CMakeLists.txt
        test -f README.md
        grep -q "ESP32-S31-Korvo-1" README.md
        grep -q "build/retro-go-s31-full.img" README.md
        if git ls-files | grep -Ei '(^|/)(build|roms?|romart)/|\.((nes|gba|gbc|gb|sfc|smc|gw|img|7z|rar|zip))$'; then
          echo "Generated files, ROMs or archives should not be tracked."
          exit 1
        fi
